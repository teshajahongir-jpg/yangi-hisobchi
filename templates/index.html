<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ish Nazorati Kamera</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f6f9; margin: 0; padding: 20px; }
        h3 { color: #333; }
        video, canvas { width: 100%; max-width: 360px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: #000; }
        button { background: #248b65; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; width: 100%; max-width: 360px; }
        button:disabled { background: #ccc; }
        #status { margin-top: 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <h3>📸 Jonli Rasm Tasdiqlash</h3>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <button id="snap">📷 Rasmga tushish va jo'natish</button>
    <div id="status">Kameraga ruxsat berilishi kutilmoqda...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Foydalanuvchi ID sini Telegram WebApp'dan olish
        const userId = tg.initDataUnsafe?.user?.id || 0;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snapBtn = document.getElementById('snap');
        const statusDiv = document.getElementById('status');

        navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 300, facingMode: "user" }, audio: false })
            .then(stream => {
                video.srcObject = stream;
                statusDiv.innerText = "Kamera tayyor. Yuzingiz aniq ko'rinsin!";
            })
            .catch(err => {
                statusDiv.innerText = "Kamera ochilmadi! Ruxsat berilganini tekshiring.";
                snapBtn.disabled = true;
            });

        snapBtn.addEventListener('click', async () => {
            statusDiv.innerText = "Rasm serverga yuborilmoqda...";
            snapBtn.disabled = true;

            const context = canvas.getContext('2d');
            canvas.width = 400;
            canvas.height = 300;
            context.drawImage(video, 0, 0, 400, 300);

            const imageData = canvas.toDataURL('image/jpeg', 0.4);

            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode') || 'start';

            // Telegram orqali emas, to'g'ridan-to'g'ri internet orqali Render serverga yuborish
            try {
                const response = await fetch('/upload_photo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        image: imageData,
                        mode: mode
                    })
                });

                if (response.ok) {
                    statusDiv.innerText = "✅ Muvaffaqiyatli yuborildi! Botga qaytishingiz mumkin.";
                    setTimeout(() => { tg.close(); }, 800);
                } else {
                    statusDiv.innerText = "❌ Server qabul qilmadi. Qayta urining.";
                    snapBtn.disabled = false;
                }
            } catch (e) {
                // Agar internet orqali ham ketmasa, Telegram o'ziga tashlab ko'radi
                try {
                    tg.sendData(JSON.stringify({ image: imageData, mode: mode }));
                    statusDiv.innerText = "Muvaffaqiyatli jo'natildi!";
                    setTimeout(() => { tg.close(); }, 500);
                } catch (err) {
                    statusDiv.innerText = "Aloqa xatosi! Internetni tekshiring.";
                    snapBtn.disabled = false;
                }
            }
        });
    </script>
</body>
</html>
